<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <div class="header"><h1>Rock Paper Scissors</h1></div>
    <div id="scoreboard">
        <h2>Scoreboard</h2>
<!--         <div class="players">
            <h3>Player</h3>
            <h3>Computer</h3>
        </div> -->
        <div id="scores">
            <h3 id="computerMove"></h3>
            <h3 id="current"></h3>
            <p id="playerScore">Player:</p>
            <p id="computerScore">Computer:</p>
            <h2 id="announcement"></h2>
        </div>
    </div>
    <div class="buttons">    
        <button id="rock" class="button">Rock</button>
        <button id="paper" class="button">Paper</button>
        <button id="scissors" class="button">Scissors</button>
    </div>
    <script src="rps.js"></script>
</body>
</html>
